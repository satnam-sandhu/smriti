# Pre-releases from develop: package.json uses X.Y.Z-dev.N; GitHub Release is prerelease.
# Branch protection: allow github-actions[bot] to push commits and tags (or use a PAT with contents:write).

name: NitroChat release (develop)

on:
  push:
    branches:
      - develop

permissions:
  contents: write

concurrency:
  group: nitrochat-release-develop
  cancel-in-progress: false

jobs:
  release:
    if: ${{ github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Configure git
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync branch and tags
        run: |
          set -euo pipefail
          git fetch origin --tags
          git pull --ff-only origin "${{ github.ref_name }}"

      - name: Repair, bump, tag, GitHub Release
        run: |
          set -euo pipefail

          VERSION="$(jq -r '.version' package.json)"
          if [[ -z "${VERSION}" || "${VERSION}" == "null" ]]; then
            echo "package.json missing .version"
            exit 1
          fi

          TAG="v${VERSION}"

          tag_exists() {
            git rev-parse "$1" >/dev/null 2>&1 \
              || git ls-remote --exit-code --tags origin "refs/tags/$1" >/dev/null 2>&1
          }

          create_prerelease() {
            local t="$1" ver="$2"
            if gh release view "${t}" >/dev/null 2>&1; then
              echo "Release for ${t} already exists; done."
              return 0
            fi
            gh release create "${t}" \
              --target "$(git rev-parse HEAD)" \
              --title "NitroChat ${ver}" \
              --generate-notes \
              --prerelease
          }

          # Repair: version in package.json never got a tag
          if ! tag_exists "${TAG}"; then
            echo "Tag ${TAG} missing; tagging HEAD (repair) and creating prerelease."
            git tag -a "${TAG}" -m "Release ${TAG}"
            git push origin "refs/tags/${TAG}"
            create_prerelease "${TAG}" "${VERSION}"
            exit 0
          fi

          # Bump dev line (same math as NitroStudio release-dev.js patch)
          NEW_VERSION="$(node <<'NODE'
          const fs = require('fs');
          const re = /^(\d+)\.(\d+)\.(\d+)(?:-dev(?:\.(\d+))?)?$/;
          const v = JSON.parse(fs.readFileSync('package.json','utf8')).version.trim();
          const m = v.match(re);
          if (!m) {
            console.error('Invalid version:', v);
            process.exit(1);
          }
          let major = +m[1], minor = +m[2], patch = +m[3];
          const onDev = v.includes('-dev');
          const devN = onDev ? (m[4] !== undefined ? +m[4] : 1) : null;
          let outMajor = major, outMinor = minor, outPatch = patch, outDev;
          if (onDev) {
            outDev = devN + 1;
          } else {
            outPatch = patch + 1;
            outDev = 1;
          }
          console.log(`${outMajor}.${outMinor}.${outPatch}-dev.${outDev}`);
          NODE
          )"

          npm version "${NEW_VERSION}" --no-git-tag-version

          NEW_TAG="v${NEW_VERSION}"
          git add package.json package-lock.json
          git commit -m "chore(release): bump version to ${NEW_VERSION} [skip ci]"
          git push origin "HEAD:${{ github.ref_name }}"

          if tag_exists "${NEW_TAG}"; then
            echo "Tag ${NEW_TAG} already exists; skipping tag and release."
            exit 0
          fi

          git tag -a "${NEW_TAG}" -m "Release ${NEW_TAG}"
          git push origin "refs/tags/${NEW_TAG}"
          create_prerelease "${NEW_TAG}" "${NEW_VERSION}"
