version: 0.2

phases:
  pre_build:
    commands:
      - |
        echo $CODEBUILD_SOURCE_VERSION
        
        set -e

        if [ -z "${NITROCHAT_ECR_URL:-}" ]; then
          echo "Missing ECR URL"
          exit 1
        fi

        ECR_REGISTRY=$(echo "$NITROCHAT_ECR_URL" | cut -d/ -f1)

        ECR_REGION=$(echo "$ECR_REGISTRY" | sed -n 's/.*\.ecr\.\([^.]*\)\.amazonaws\.com/\1/p')

        if [ -z "$ECR_REGION" ]; then
          ECR_REGION="${AWS_DEFAULT_REGION:-$AWS_REGION}"
        fi

        export AWS_DEFAULT_REGION="$ECR_REGION"

        echo "Logging into ECR: $ECR_REGISTRY"

        aws ecr get-login-password --region "$ECR_REGION" \
          | docker login --username AWS --password-stdin "$ECR_REGISTRY"

  build:
    commands:
      - |
        set -e

        export DOCKER_BUILDKIT=1

        if [ -f Dockerfile ]; then
          DOCKER_CTX=.
        elif [ -f nitrochat/Dockerfile ]; then
          DOCKER_CTX=nitrochat
        else
          echo "No Dockerfile found"
          exit 1
        fi

        NITROCHAT_IMAGE_URI="${NITROCHAT_ECR_URL}:${IMAGE_TAG}"

        BUILDER_NAME=nitrochat-bldr
        docker buildx use "$BUILDER_NAME" || docker buildx create --use

        echo "Building WITHOUT cache"

        docker buildx build \
          --platform linux/arm64 \
          --no-cache \
          --build-arg CACHE_BUST="$(date +%s)" \
          --tag "$NITROCHAT_IMAGE_URI" \
          --push \
          "$DOCKER_CTX"